version: 2

before:
  hooks:
    - go mod tidy -diff
    - go mod download
    - go mod verify

builds:
  - main: ./...
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - arm64
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w

gomod:
  proxy: true

nfpms:
  - vendor: Typist Tech Limited
    maintainer: "Typist Tech Limited <opensource+{{ .ProjectName }}@typist.tech>"
    license: MIT
    formats:
      - apk
      - deb
    mtime: "{{ .CommitDate }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

homebrew_casks:
  - name: wpry
    homepage: https://github.com/typisttech/wpry
    description: |-
      Parses WordPress plugin and theme headers
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/wpry"]
          end
    repository:
      owner: typisttech
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_HOMEBREW_GITHUB_TOKEN }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  use_existing_draft: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
