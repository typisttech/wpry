name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actions:
    uses: typisttech/.github/.github/workflows/lint-actions.yml@2273764b628c3b4b05116711ea206967f085a14b # v5.5.2

  go:
    uses: typisttech/.github/.github/workflows/lint-go.yml@617c38e301cb42b0a1edd3ef84ef50663e0a98ab # v5.5.1
    with:
      golangci-lint: true
      golangci-lint-version-file: .tool-versions

  wait-for-all-lint:
    if: cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')
    needs:
      - actions
      - go
    runs-on: ubuntu-latest
    steps:
      - name: Assert no required jobs were cancelled or failed
        run: exit 1
