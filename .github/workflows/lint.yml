name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actions:
    uses: typisttech/.github/.github/workflows/lint-actions.yml@424ca47b4936481497d05bd7970affa73ec84b74 # v5.4.1

  go:
    uses: typisttech/.github/.github/workflows/lint-go.yml@424ca47b4936481497d05bd7970affa73ec84b74 # v5.4.1
    with:
      golangci-lint: true
      golangci-lint-version-file: .tool-versions

  wait-for-all-lint:
    if: cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')
    needs:
      - actions
      - go
    runs-on: ubuntu-latest
    steps:
      - name: Assert no required jobs were cancelled or failed
        run: exit 1
