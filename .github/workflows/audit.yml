name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '11 3 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@63fe4f651bb4747b3b17be96c32fcffd5954882c # v5.3.0
