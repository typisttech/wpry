name: GoReleaser

on:
  push:
    tags:
      - "v*"

jobs:
  release-drafter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        with:
          tag: ${{ github.ref_name }}

  goreleaser:
    runs-on: ubuntu-latest
    needs:
      - release-drafter
    permissions:
      # For GoReleaser
      contents: write
      # For actions/attest
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.TASTENDRUCK_CLIENT_ID }}
          private-key: ${{ secrets.TASTENDRUCK_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_HOMEBREW_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt

      - uses: cloudsmith-io/cloudsmith-cli-action@v2.0.2
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY_TASTENDRUCK }}
      - run: cloudsmith push deb typisttech/oss/any-distro/any-version 'dist/*.deb'
      - run: cloudsmith push deb typisttech/oss/any-distro/any-version 'dist/*.apk'
